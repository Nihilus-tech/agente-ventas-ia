<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Agente de Ventas GO4MORE</title>
    <style>
        body { font-family: Arial; max-width: 800px; margin: 50px auto; padding: 20px; background: #f5f5f5; }
        h1 { color: #2c3e50; text-align: center; }
        textarea { width: 100%; height: 120px; padding: 10px; font-size: 16px; border-radius: 8px; border: 1px solid #ccc; }
        button { width: 100%; padding: 15px; background: #27ae60; color: white; font-size: 18px; border: none; border-radius: 8px; cursor: pointer; margin-top: 10px; }
        button:hover { background: #219a52; }
        #respuesta { background: white; padding: 20px; border-radius: 8px; margin-top: 20px; white-space: pre-wrap; display: none; }
        #copiar { background: #2980b9; display: none; }
    </style>
</head>
<body>
    <h1>🤖 Agente de Ventas GO4MORE</h1>
    <p>Describe el prospecto y el agente generará el mensaje perfecto:</p>
    <textarea id="consulta" placeholder="Ejemplo: Mujer que comentó en mi publicación preguntando por horarios y precios del curso de inglés..."></textarea>
    <button onclick="consultar()">✨ Generar Mensaje</button>
    <button id="copiar" onclick="copiar()">📋 Copiar Mensaje</button>
    <div id="respuesta"></div>

    <script>
        async function consultar() {
            const consulta = document.getElementById('consulta').value;
            document.getElementById('respuesta').innerHTML = '⏳ Generando mensaje...';
            document.getElementById('respuesta').style.display = 'block';
            const res = await fetch('/consultar', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({consulta})
            });
            const data = await res.json();
            document.getElementById('respuesta').innerHTML = data.respuesta;
            document.getElementById('copiar').style.display = 'block';
        }
        function copiar() {
            navigator.clipboard.writeText(document.getElementById('respuesta').innerText);
            alert('¡Mensaje copiado!');
        }
    </script>
</body>
</html>
