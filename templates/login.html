<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GO4MORE — Iniciar Sesión</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤖</text></svg>">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #1B4F8A 0%, #00B5B8 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-container {
            width: 100%;
            max-width: 420px;
        }
        .logo-area {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo-area .marca {
            font-size: 48px;
            font-weight: bold;
            color: white;
            letter-spacing: 2px;
        }
        .logo-area .marca span { color: #f0fafa; }
        .logo-area .subtitulo {
            color: rgba(255,255,255,0.8);
            font-size: 14px;
            margin-top: 5px;
            letter-spacing: 3px;
            text-transform: uppercase;
        }
        .logo-area .icono {
            font-size: 55px;
            margin-bottom: 10px;
            display: block;
        }
        .card {
            background: white;
            border-radius: 16px;
            padding: 35px 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }
        .card h2 {
            color: #1B4F8A;
            font-size: 20px;
            margin-bottom: 25px;
            text-align: center;
            border-bottom: 2px solid #00B5B8;
            padding-bottom: 15px;
        }
        .campo {
            margin-bottom: 18px;
        }
        .campo label {
            display: block;
            font-size: 13px;
            color: #555;
            margin-bottom: 6px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .campo input {
            width: 100%;
            padding: 13px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 15px;
            transition: border 0.2s;
            font-family: inherit;
        }
        .campo input:focus {
            outline: none;
            border-color: #00B5B8;
        }
        .btn-login {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #1B4F8A, #00B5B8);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 8px;
            transition: opacity 0.2s, transform 0.2s;
            letter-spacing: 0.5px;
        }
        .btn-login:hover {
            opacity: 0.92;
            transform: translateY(-1px);
        }
        .error {
            background: #fff0f0;
            border: 1px solid #E31E24;
            color: #E31E24;
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 18px;
            text-align: center;
        }
        .footer-login {
            text-align: center;
            margin-top: 20px;
            color: rgba(255,255,255,0.7);
            font-size: 12px;
        }

        @media (max-width: 480px) {
            .card { padding: 25px 20px; }
            .logo-area .marca { font-size: 36px; }
            .logo-area .icono { font-size: 40px; }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo-area">
            <span class="icono">🤖</span>
            <div class="marca">GO<span>4</span>MORE</div>
            <div class="subtitulo">English for Life</div>
        </div>

        <div class="card">
            <h2>Agente IA — Iniciar Sesión</h2>

            {% with messages = get_flashed_messages() %}
                {% if messages %}
                    <div class="error">{{ messages[0] }}</div>
                {% endif %}
            {% endwith %}

            <form method="POST">
                <div class="campo">
                    <label>Correo electrónico</label>
                    <input type="email" name="correo" placeholder="correo@go4more.com" required>
                </div>
                <div class="campo">
                    <label>Contraseña</label>
                    <input type="password" name="contrasena" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-login">Entrar al Panel</button>
            </form>
        </div>

        <div class="footer-login">
            GO4MORE Agente IA © 2026
        </div>
    </div>
</body>
</html>
